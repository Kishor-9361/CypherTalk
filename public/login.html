<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CypherTalk | Secure Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0f131d",
                        "surface-container": "#1c1f2a",
                        "surface-container-low": "#171b26",
                        "background": "#0b0f19",
                        "primary": "#b4c5ff",
                        "primary-container": "#2563eb",
                        "secondary": "#4edea3",
                        "outline": "#8d90a0",
                        "on-surface": "#dfe2f1",
                        "on-surface-variant": "#c3c6d7",
                        "error": "#ffb4ab",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        display: ["Outfit", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0f19;
            color: #dfe2f1;
        }
        .glass-panel {
            background: rgba(23, 27, 38, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .glow-input:focus {
            border-color: rgba(37, 99, 235, 0.8) !important;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.25) !important;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4 relative overflow-hidden font-sans">
    
    <!-- Background Ambient Glow -->
    <div class="absolute inset-0 pointer-events-none opacity-30">
        <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-primary-container/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-secondary/15 rounded-full blur-[100px]"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-[450px] z-10">
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <h1 class="font-display text-4xl font-bold text-primary tracking-tight mb-2">CypherTalk</h1>
            <p class="text-on-surface-variant text-sm flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[16px] text-secondary">verified_user</span>
                Decentralized & Secure WebRTC Tunneling
            </p>
        </div>

        <!-- Glass Panel Box -->
        <div class="glass-panel rounded-2xl p-8 flex flex-col gap-6">
            <!-- Tabs -->
            <div class="flex border-b border-white/10" id="authTabs">
                <button class="flex-1 pb-3 text-center font-display font-semibold border-b-2 border-primary text-primary transition-all duration-300" id="tabLoginBtn" onclick="setTab('login')">
                    Login
                </button>
                <button class="flex-1 pb-3 text-center font-display font-semibold border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-all duration-300" id="tabRegisterBtn" onclick="setTab('register')">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs uppercase tracking-wider text-outline" for="loginEmail">Secure ID / Email</label>
                    <input type="email" id="loginEmail" required class="bg-background/80 border border-white/10 rounded-lg py-2.5 px-4 text-on-surface glow-input transition-all placeholder-white/20" placeholder="user@domain.com">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs uppercase tracking-wider text-outline" for="loginPassword">Cipher Key / Password</label>
                    <input type="password" id="loginPassword" required class="bg-background/80 border border-white/10 rounded-lg py-2.5 px-4 text-on-surface glow-input transition-all placeholder-••••••••" placeholder="••••••••">
                </div>
                <button type="submit" id="btnLoginSubmit" class="bg-primary-container text-white py-2.5 rounded-lg font-display font-semibold hover:brightness-110 active:scale-98 transition-all mt-2 shadow-lg shadow-primary-container/20">
                    Sign In to Node
                </button>
            </form>

            <!-- Register Form (Step 1: Account Creation) -->
            <form id="registerStep1" onsubmit="handleRegisterStep1(event)" class="hidden flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs uppercase tracking-wider text-outline" for="regEmail">Verification Email</label>
                    <input type="email" id="regEmail" required class="bg-background/80 border border-white/10 rounded-lg py-2.5 px-4 text-on-surface glow-input transition-all placeholder-white/20" placeholder="user@domain.com">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs uppercase tracking-wider text-outline" for="regPassword">Access Password</label>
                    <input type="password" id="regPassword" required class="bg-background/80 border border-white/10 rounded-lg py-2.5 px-4 text-on-surface glow-input transition-all placeholder-••••••••" placeholder="••••••••">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs uppercase tracking-wider text-outline" for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" required class="bg-background/80 border border-white/10 rounded-lg py-2.5 px-4 text-on-surface glow-input transition-all placeholder-••••••••" placeholder="••••••••">
                </div>
                <button type="submit" id="btnRegisterSubmit1" class="bg-primary-container text-white py-2.5 rounded-lg font-display font-semibold hover:brightness-110 active:scale-98 transition-all mt-2">
                    Create Profile & Send Link
                </button>
            </form>

            <!-- Register Form (Step 2: Email Verification Check & Display Name) -->
            <div id="registerStep2" class="hidden flex flex-col gap-4">
                <div class="bg-secondary/10 border border-secondary/20 p-3 rounded-lg text-secondary text-xs flex items-start gap-2">
                    <span class="material-symbols-outlined text-[16px] mt-0.5">info</span>
                    <span>We sent a verification link to your email. Click the link in your inbox first, then fill in your display name and click verify.</span>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs uppercase tracking-wider text-outline" for="regDisplayName">Uplink Display Name</label>
                    <input type="text" id="regDisplayName" required class="bg-background/80 border border-white/10 rounded-lg py-2.5 px-4 text-on-surface glow-input transition-all placeholder-e.g. Alex" placeholder="Alex" id="regDisplayName">
                </div>
                <div class="flex gap-2 mt-2">
                    <button type="button" onclick="resetRegisterFlow()" class="flex-1 py-2.5 rounded-lg border border-white/10 text-on-surface-variant hover:bg-white/5 transition-all text-sm font-semibold">
                        Back
                    </button>
                    <button type="button" onclick="handleVerifyAndCompleteRegistration()" id="btnRegisterSubmit2" class="flex-[2] bg-secondary text-background py-2.5 rounded-lg font-display font-bold hover:brightness-110 active:scale-98 transition-all text-sm">
                        Verify & Authorize Node
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Auth Integration Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            sendEmailVerification,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Fetch Firebase Config dynamically from server
        const configRes = await fetch('/api/firebase-config');
        const firebaseConfig = await configRes.json();

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentTab = 'login';

        window.setTab = function(tab) {
            currentTab = tab;
            const tabLoginBtn = document.getElementById('tabLoginBtn');
            const tabRegisterBtn = document.getElementById('tabRegisterBtn');
            const loginForm = document.getElementById('loginForm');
            const registerStep1 = document.getElementById('registerStep1');
            const registerStep2 = document.getElementById('registerStep2');

            if (tab === 'login') {
                tabLoginBtn.className = "flex-1 pb-3 text-center font-display font-semibold border-b-2 border-primary text-primary transition-all duration-300";
                tabRegisterBtn.className = "flex-1 pb-3 text-center font-display font-semibold border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-all duration-300";
                loginForm.classList.remove('hidden');
                registerStep1.classList.add('hidden');
                registerStep2.classList.add('hidden');
            } else {
                tabLoginBtn.className = "flex-1 pb-3 text-center font-display font-semibold border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-all duration-300";
                tabRegisterBtn.className = "flex-1 pb-3 text-center font-display font-semibold border-b-2 border-primary text-primary transition-all duration-300";
                loginForm.classList.add('hidden');
                resetRegisterFlow();
            }
        };

        window.resetRegisterFlow = function() {
            document.getElementById('registerStep1').classList.remove('hidden');
            document.getElementById('registerStep2').classList.add('hidden');
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('regDisplayName').value = '';
        };

        // Sign In Flow
        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLoginSubmit');
            
            btn.disabled = true;
            btn.innerText = 'Connecting...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Reload user to fetch fresh emailVerified status
                await user.reload();

                if (!user.emailVerified) {
                    await sendEmailVerification(user);
                    alert("Your email is not verified yet. We have resent a verification link to your inbox. Please click it to sign in.");
                    await signOut(auth);
                    btn.disabled = false;
                    btn.innerText = 'Sign In to Node';
                    return;
                }

                const token = await user.getIdToken();
                
                // Let backend know they logged in and ensure they are registered in the DB
                const regRes = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: token })
                });

                if (regRes.ok) {
                    localStorage.setItem('token', token);
                    localStorage.setItem('userId', user.uid);
                    localStorage.setItem('email', user.email);
                    window.location.href = '/';
                } else {
                    const data = await regRes.json();
                    alert(data.error || "Failed to initialize server-side profile.");
                    await signOut(auth);
                }
            } catch (err) {
                console.error(err);
                alert("Authentication Failed: " + getReadableErrorMessage(err.code));
            } finally {
                btn.disabled = false;
                btn.innerText = 'Sign In to Node';
            }
        };

        // Register Step 1: Create Account & Send Verification Email
        window.handleRegisterStep1 = async function(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const btn = document.getElementById('btnRegisterSubmit1');

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Initializing Profile...';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Send verification link
                await sendEmailVerification(user);
                
                // Advance UI to Step 2
                document.getElementById('registerStep1').classList.add('hidden');
                document.getElementById('registerStep2').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert("Registration Failed: " + getReadableErrorMessage(err.code));
            } finally {
                btn.disabled = false;
                btn.innerText = 'Create Profile & Send Link';
            }
        };

        // Register Step 2: Confirm Verification Link Clicked
        window.handleVerifyAndCompleteRegistration = async function() {
            const displayName = document.getElementById('regDisplayName').value.trim();
            const btn = document.getElementById('btnRegisterSubmit2');
            const user = auth.currentUser;

            if (!user) {
                alert("Session lost. Please return to Step 1.");
                resetRegisterFlow();
                return;
            }

            if (!displayName) {
                alert("Please select an Uplink Display Name.");
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Verifying...';

            try {
                // Fetch fresh emailVerified status from Google
                await user.reload();

                if (!user.emailVerified) {
                    alert("Uplink verification link not yet clicked. Please click the link in your email inbox and try again.");
                    btn.disabled = false;
                    btn.innerText = 'Verify & Authorize Node';
                    return;
                }

                // Get Firebase ID Token
                const token = await user.getIdToken();

                // Send to backend database
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: token, displayName })
                });

                if (res.ok) {
                    localStorage.setItem('token', token);
                    localStorage.setItem('userId', user.uid);
                    localStorage.setItem('email', user.email);
                    localStorage.setItem('displayName', displayName);
                    alert("Uplink established! Registration complete.");
                    window.location.href = '/';
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to register profile on database.");
                }
            } catch (err) {
                console.error(err);
                alert("Verification check failed.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'Verify & Authorize Node';
            }
        };

        function getReadableErrorMessage(code) {
            switch(code) {
                case 'auth/invalid-email': return 'Invalid email address.';
                case 'auth/email-already-in-use': return 'An account already exists for this email.';
                case 'auth/weak-password': return 'Password must be at least 6 characters.';
                case 'auth/wrong-password': return 'Incorrect password.';
                case 'auth/user-not-found': return 'Profile not found.';
                default: return 'An error occurred during verification.';
            }
        }
    </script>
</body>
</html>
